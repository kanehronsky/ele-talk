<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <!-- Prevent zoom; set landscape orientation for tablet use -->
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
  <!-- PWA / home-screen meta -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="ELE Talk" />
  <meta name="theme-color" content="#4A86C8" />
  <title>ELE Talk</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.svg" />

  <style>
    /* ═══════════════════════════════════════════════════
       RESET & BASE
    ═══════════════════════════════════════════════════ */
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif;
      background: #d8dce4;
      overscroll-behavior: none;        /* disable pull-to-refresh */
      -webkit-overflow-scrolling: none;
    }

    /* ═══════════════════════════════════════════════════
       APP SHELL — full-viewport flex column
    ═══════════════════════════════════════════════════ */
    #app {
      display: flex;
      flex-direction: column;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    /* ═══════════════════════════════════════════════════
       SENTENCE STRIP — fixed bar at the top
    ═══════════════════════════════════════════════════ */
    #sentence-strip {
      display: flex;
      align-items: center;
      height: 72px;
      min-height: 72px;
      flex-shrink: 0;
      background: #ffffff;
      border-bottom: 3px solid #dde0e8;
      padding: 0 8px;
      gap: 8px;
    }

    /* High-contrast / settings toggle button */
    #settings-btn {
      flex-shrink: 0;
      width: 48px;
      height: 48px;
      background: #f0f2f5;
      border: 2px solid #d0d4dc;
      border-radius: 10px;
      font-size: 20px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #555;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s, filter 0.08s;
    }

    #settings-btn:active { transform: scale(0.9); filter: brightness(0.88); }

    /* Scrollable word-tile area */
    #word-tiles {
      flex: 1;
      display: flex;
      align-items: center;
      gap: 6px;
      overflow-x: auto;
      overflow-y: hidden;
      height: 100%;
      padding: 10px 4px;
      scrollbar-width: none;
      -ms-overflow-style: none;
    }

    #word-tiles::-webkit-scrollbar { display: none; }

    /* Empty-state placeholder */
    #strip-placeholder {
      color: #b0b8c8;
      font-size: 15px;
      font-style: italic;
      white-space: nowrap;
      flex-shrink: 0;
      pointer-events: none;
    }

    /* Individual word chip */
    .word-tile {
      flex-shrink: 0;
      padding: 6px 14px;
      background: #eef2f8;
      border: 1.5px solid #c5d0e0;
      border-radius: 20px;
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      white-space: nowrap;
    }

    /* Backspace / Speak / Clear buttons */
    #strip-controls {
      display: flex;
      gap: 6px;
      flex-shrink: 0;
    }

    .strip-btn {
      width: 48px;
      height: 48px;
      border: none;
      border-radius: 10px;
      font-size: 20px;
      font-weight: 700;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s, filter 0.08s;
    }

    .strip-btn:active { transform: scale(0.9); filter: brightness(0.88); }

    #backspace-btn { background: #FFD0D0; color: #8B0000; }
    #speak-btn     { background: #C8F0C8; color: #1a5e1a; font-size: 22px; }
    #clear-btn     { background: #D0D8FF; color: #1a1a8B; }

    /* ═══════════════════════════════════════════════════
       MAIN GRID — fills all remaining viewport height
    ═══════════════════════════════════════════════════ */
    #grid {
      flex: 1;
      min-height: 0;               /* lets the flex child shrink below auto height */
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(6, 1fr);
      gap: 3px;
      padding: 3px;
      background: #ffffff;         /* white shows through the 3 px gaps as grid lines */
    }

    /* ═══════════════════════════════════════════════════
       GRID BUTTONS — Fitzgerald Key colour-coded
    ═══════════════════════════════════════════════════ */
    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-family: inherit;
      font-weight: 700;
      /* Scales smoothly from small phones to large desktops */
      font-size: clamp(10px, 1.8vw, 18px);
      color: #1a1a1a;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      padding: 6px 4px;
      line-height: 1.2;
      word-break: break-word;
      overflow-wrap: break-word;
      user-select: none;
      -webkit-user-select: none;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.08s ease, filter 0.08s ease;
    }

    /* Pressed state added via JS (touchstart) and CSS :active (mouse) */
    .btn.pressed,
    .btn:active {
      transform: scale(0.92);
      filter: brightness(0.85);
    }

    /* Fitzgerald Key colours + neon CSS variable for high-contrast mode */
    .btn.blue   { background: #4A86C8; --neon: #00BFFF; }
    .btn.green  { background: #5CAF5C; --neon: #00FF7F; }
    .btn.pink   { background: #D96BA8; --neon: #FF69B4; }
    .btn.orange { background: #E8954A; --neon: #FF8C00; }
    .btn.yellow { background: #D4A820; --neon: #FFD700; }
    .btn.red    { background: #D94848; --neon: #FF4040; }

    /* ═══════════════════════════════════════════════════
       HIGH CONTRAST MODE — class toggled on <html>
    ═══════════════════════════════════════════════════ */
    html.high-contrast body            { background: #000; }

    html.high-contrast #sentence-strip { background: #111; border-bottom-color: #333; }

    html.high-contrast #settings-btn   { background: #222; color: #eee; border-color: #555; }

    html.high-contrast #strip-placeholder { color: #555; }

    html.high-contrast .word-tile      { background: #1a1a1a; border-color: #555; color: #fff; }

    html.high-contrast #backspace-btn  { background: #400000; color: #ff8080; }
    html.high-contrast #speak-btn      { background: #004000; color: #80ff80; }
    html.high-contrast #clear-btn      { background: #000040; color: #8080ff; }

    html.high-contrast #grid           { background: #000; }

    html.high-contrast .btn {
      background: #000 !important;
      color: #ffffff !important;
      border: 2.5px solid var(--neon, #ffffff);
      box-shadow: 0 0 8px var(--neon, #ffffff);
    }
  </style>
</head>
<body>

  <div id="app">

    <!-- ── Sentence Strip ─────────────────────────────── -->
    <div id="sentence-strip" role="region" aria-label="Sentence strip">

      <button id="settings-btn" aria-label="Toggle high contrast mode" title="Toggle high contrast">
        ⚙️
      </button>

      <div id="word-tiles" role="log" aria-label="Current sentence" aria-live="polite">
        <span id="strip-placeholder">Tap words to build a sentence…</span>
      </div>

      <div id="strip-controls">
        <button id="backspace-btn" class="strip-btn" aria-label="Remove last word" title="Backspace">⌫</button>
        <button id="speak-btn"     class="strip-btn" aria-label="Speak sentence"   title="Speak">▶</button>
        <button id="clear-btn"     class="strip-btn" aria-label="Clear sentence"   title="Clear">✕</button>
      </div>

    </div>

    <!-- ── Main Grid (built by JavaScript) ───────────── -->
    <div id="grid" role="main" aria-label="Communication grid"></div>

  </div>

  <script>
    /* ═══════════════════════════════════════════════════════════
       CORE 36 — permanent vocabulary in fixed grid order.
       Index = grid slot. The position of every word is permanent
       and must never change (motor planning integrity).
    ═══════════════════════════════════════════════════════════ */
    const CORE_36 = [
      /* Row 1 — Pronouns (Blue) */
      { label: 'I / Me',      speak: 'I',        color: 'blue',   aria: 'I or Me'       },
      { label: 'You',         speak: 'You',       color: 'blue'                          },
      { label: 'It',          speak: 'It',        color: 'blue'                          },
      { label: 'We',          speak: 'We',        color: 'blue'                          },
      { label: 'Who',         speak: 'Who',       color: 'blue'                          },
      { label: 'What',        speak: 'What',      color: 'blue'                          },

      /* Row 2 — Actions (Green) */
      { label: 'Want',        speak: 'Want',      color: 'green'                         },
      { label: 'Go',          speak: 'Go',        color: 'green'                         },
      { label: 'Stop',        speak: 'Stop',      color: 'green'                         },
      { label: 'Make / Do',   speak: 'Make',      color: 'green',  aria: 'Make or Do'   },
      { label: 'Look',        speak: 'Look',      color: 'green'                         },
      { label: 'Like',        speak: 'Like',      color: 'green'                         },

      /* Row 3 — Position (Pink) */
      { label: 'In',          speak: 'In',        color: 'pink'                          },
      { label: 'Out',         speak: 'Out',       color: 'pink'                          },
      { label: 'Up',          speak: 'Up',        color: 'pink'                          },
      { label: 'Down',        speak: 'Down',      color: 'pink'                          },
      { label: 'On',          speak: 'On',        color: 'pink'                          },
      { label: 'Off',         speak: 'Off',       color: 'pink'                          },

      /* Row 4 — Descriptors (Orange) */
      { label: 'Big',         speak: 'Big',       color: 'orange'                        },
      { label: 'Little',      speak: 'Little',    color: 'orange'                        },
      { label: 'Good',        speak: 'Good',      color: 'orange'                        },
      { label: 'Bad / Yucky', speak: 'Bad',       color: 'orange', aria: 'Bad or Yucky' },
      { label: 'More',        speak: 'More',      color: 'orange'                        },
      { label: 'All Done',    speak: 'All Done',  color: 'orange'                        },

      /* Row 5 — Nouns / Navigation (Yellow) */
      { label: 'MY WORDS',    speak: 'My Words',  color: 'yellow'                        },
      { label: 'People',      speak: 'People',    color: 'yellow'                        },
      { label: 'Food',        speak: 'Food',      color: 'yellow'                        },
      { label: 'Drink',       speak: 'Drink',     color: 'yellow'                        },
      { label: 'Places',      speak: 'Places',    color: 'yellow'                        },
      { label: 'Toys / Play', speak: 'Toys',      color: 'yellow', aria: 'Toys or Play' },

      /* Row 6 — Power Tools (Red) — always on the outer right edge */
      { label: 'YES',         speak: 'Yes',       color: 'red'                           },
      { label: 'NO',          speak: 'No',        color: 'red'                           },
      { label: 'STOP',        speak: 'Stop',      color: 'red'                           },
      { label: 'GO',          speak: 'Go',        color: 'red'                           },
      { label: 'WAIT',        speak: 'Wait',      color: 'red'                           },
      { label: 'BREAK',       speak: 'Break',     color: 'red'                           },
    ];

    /* ═══════════════════════════════════════════════════════════
       APP STATE
    ═══════════════════════════════════════════════════════════ */
    let sentenceWords = [];   // array of word objects currently in the strip

    /* ═══════════════════════════════════════════════════════════
       SPEECH — Web Speech API
    ═══════════════════════════════════════════════════════════ */
    function speak(text) {
      if (!window.speechSynthesis) return;
      speechSynthesis.cancel();   // prevent queue build-up from rapid taps
      const utterance = new SpeechSynthesisUtterance(text);
      utterance.rate  = 1.0;
      utterance.pitch = 1.0;
      speechSynthesis.speak(utterance);
    }

    /* iOS requires a user gesture before audio context is available.
       Calling cancel() on the first touchstart initialises the context. */
    document.addEventListener('touchstart', function unlockSpeech() {
      if (window.speechSynthesis) speechSynthesis.cancel();
      document.removeEventListener('touchstart', unlockSpeech);
    }, { passive: true });

    /* ═══════════════════════════════════════════════════════════
       SENTENCE STRIP — state and rendering
    ═══════════════════════════════════════════════════════════ */
    const tilesEl     = document.getElementById('word-tiles');
    const placeholder = document.getElementById('strip-placeholder');

    function renderStrip() {
      tilesEl.querySelectorAll('.word-tile').forEach(t => t.remove());

      if (sentenceWords.length === 0) {
        placeholder.style.display = '';
      } else {
        placeholder.style.display = 'none';
        sentenceWords.forEach(word => {
          const tile = document.createElement('div');
          tile.className = 'word-tile';
          tile.textContent = word.label;
          tilesEl.appendChild(tile);
        });
        // Scroll to reveal the most recently added word
        requestAnimationFrame(() => { tilesEl.scrollLeft = tilesEl.scrollWidth; });
      }
    }

    function addWord(wordObj) {
      sentenceWords.push(wordObj);
      renderStrip();
    }

    function removeLastWord() {
      if (sentenceWords.length === 0) return;
      sentenceWords.pop();
      renderStrip();
    }

    function clearSentence() {
      sentenceWords = [];
      renderStrip();
    }

    function speakSentence() {
      if (sentenceWords.length === 0) return;
      speak(sentenceWords.map(w => w.speak).join(' '));
    }

    document.getElementById('backspace-btn').addEventListener('click', removeLastWord);
    document.getElementById('speak-btn').addEventListener('click', speakSentence);
    document.getElementById('clear-btn').addEventListener('click', clearSentence);

    /* ═══════════════════════════════════════════════════════════
       HIGH CONTRAST TOGGLE
    ═══════════════════════════════════════════════════════════ */
    document.getElementById('settings-btn').addEventListener('click', () => {
      document.documentElement.classList.toggle('high-contrast');
    });

    /* ═══════════════════════════════════════════════════════════
       TOUCH DEBOUNCE — 100ms guard against double-fires from
       heavy or sliding touches common in the target population
    ═══════════════════════════════════════════════════════════ */
    let lastTapTime  = 0;
    let isTouchDevice = false;

    // Once we see a touchstart we know this is a touch device and
    // can suppress the mousedown fallback to prevent double-firing.
    document.addEventListener('touchstart', () => { isTouchDevice = true; }, { once: true, passive: true });

    function handleButtonTap(wordObj) {
      const now = Date.now();
      if (now - lastTapTime < 100) return;
      lastTapTime = now;
      addWord(wordObj);
      speak(wordObj.speak);
    }

    /* ═══════════════════════════════════════════════════════════
       GRID RENDERING — build 36 buttons from CORE_36
    ═══════════════════════════════════════════════════════════ */
    const gridEl = document.getElementById('grid');

    CORE_36.forEach((item) => {
      const btn = document.createElement('button');
      btn.className = `btn ${item.color}`;
      btn.textContent = item.label;
      btn.setAttribute('aria-label', item.aria || item.label);
      btn.setAttribute('type', 'button');

      /* Fire on touchstart for zero-latency response on touch devices */
      btn.addEventListener('touchstart', (e) => {
        e.preventDefault();             // block ghost clicks and browser gestures
        btn.classList.add('pressed');
        handleButtonTap(item);
      }, { passive: false });

      btn.addEventListener('touchend',    () => btn.classList.remove('pressed'), { passive: true });
      btn.addEventListener('touchcancel', () => btn.classList.remove('pressed'), { passive: true });

      /* mousedown fallback for desktop/laptop — skipped on touch devices */
      btn.addEventListener('mousedown', () => {
        if (isTouchDevice) return;
        handleButtonTap(item);
      });

      gridEl.appendChild(btn);
    });

    /* ═══════════════════════════════════════════════════════════
       GESTURE PREVENTION — block pinch-zoom across the whole page
    ═══════════════════════════════════════════════════════════ */
    document.addEventListener('touchmove', (e) => {
      if (e.touches.length > 1) e.preventDefault();
    }, { passive: false });

    /* ═══════════════════════════════════════════════════════════
       SERVICE WORKER — register for offline / PWA support
    ═══════════════════════════════════════════════════════════ */
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js')
          .catch(err => console.warn('Service worker registration failed:', err));
      });
    }
  </script>
</body>
</html>
