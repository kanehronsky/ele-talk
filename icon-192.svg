<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192" width="192" height="192">
  <!-- Blue background with rounded corners -->
  <rect width="192" height="192" rx="32" fill="#4A86C8"/>
  <!-- White speech bubble body -->
  <rect x="20" y="18" width="152" height="112" rx="14" fill="#ffffff"/>
  <!-- Speech bubble tail pointing down-left -->
  <polygon points="56,130 80,162 104,130" fill="#ffffff"/>
  <!-- ELE logotype -->
  <text x="96" y="90"
        text-anchor="middle"
        font-family="Arial, Helvetica, sans-serif"
        font-weight="900"
        font-size="46"
        fill="#4A86C8">ELE</text>
</svg>
